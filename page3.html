<style>

.btn {
    position: absolute;
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
}

/* 🎮 الأزرار (نظام نسبي + حجم مستقل) */

#b1 { top: 25%; left: 15%; font-size: 20px; padding: 8px 18px; transform: scale(1); }
#b2 { top: 25%; left: 40%; font-size: 18px; padding: 6px 16px; transform: scale(1.1); }
#b3 { top: 25%; left: 65%; font-size: 22px; padding: 10px 20px; transform: scale(1); }

#b4 { top: 55%; left: 15%; font-size: 20px; padding: 8px 18px; transform: scale(1); }
#b5 { top: 55%; left: 40%; font-size: 18px; padding: 6px 16px; transform: scale(1.1); }
#b6 { top: 55%; left: 65%; font-size: 22px; padding: 10px 20px; transform: scale(1); }

/* 🔙 العودة */
#back {
    top: 85%;
    left: 45%;
    font-size: 24px;
    padding: 10px 30px;
    transform: scale(1);
}
</style>
</head>

<body>

<img src="2.png" width="100%" height="100%" style="position:absolute;z-index:-1;">

<form action="LINK3"><button id="b3" class="btn">Btn3</button></form>

</form>

</html>
