<html>

<title>PS3LB</title>

<!-- 🚀 Preload الصور -->
<link rel="preload" as="image" href="2.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* الصفحات */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
}

#home {
    display: block;
}

/* الخلفيات */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* الأزرار */
.btn {
    position: absolute;
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
}

/* ===== الصفحة الرئيسية ===== */
#btn1 { top: 63%; left: 30%; font-size: 22px; padding: 10px 40px; }
#btn2 { top: 73%; left: 30%; font-size: 22px; padding: 10px 40px; }

/* ===== الصفحة 2 ===== */
#p2_b1 { top: 47%; left: 34%; font-size: 20px; padding: 10px 50px; }
#p2_b2 { top: 61%; left: 34%; font-size: 20px; padding: 10px 50px; }
#p2_b3 { top: 74%; left: 34%; font-size: 20px; padding: 10px 50px; }

#p2_b4 { top: 47%; left: 80%; font-size: 20px; padding: 10px 40px; }
#p2_b5 { top: 61%; left: 69%; font-size: 20px; padding: 10px 30px; }
#p2_b6 { top: 61%; left: 80%; font-size: 20px; padding: 10px 30px; }
#p2_b7 { top: 74%; left: 79%; font-size: 20px; padding: 10px 50px; }

/* ===== الصفحة 3 ===== */

#p3_b3 { top: 74%; left: 34%; font-size: 20px; padding: 10px 50px; }

#p3_b5 { top: 61%; left: 69%; font-size: 20px; padding: 10px 30px; }
#p3_b6 { top: 61%; left: 80%; font-size: 20px; padding: 10px 30px; }
#p3_b7 { top: 74%; left: 79%; font-size: 20px; padding: 10px 50px; }

#p3_back { top: 85%; left: 04%; font-size: 24px; padding: 10px 30px; }
</style>

<script>
// 🚀 تحميل الصور مسبقًا (مهم جدًا للـ PS3)
function preloadImages() {
    var img1 = new Image();
    var img2 = new Image();

    img1.src = "2.png";
    img2.src = "3.png";
}

// 🎮 التنقل السريع
function showPage(page) {
    document.getElementById("home").style.display = "none";
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "none";

    document.getElementById(page).style.display = "block";
}

window.onload = preloadImages;
</script>

</head>

<body>

    <button id="btn1" class="btn" onclick="showPage('page2')">Click Here</button>
