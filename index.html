<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<meta charset="utf-8">
<title>Update</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* 🎯 قاعدة الأزرار */
.btn {
    position: absolute;
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
}

/* 🔵 زر 1 */
#btn1 {
    top: 62%;
    left: 20%;
    font-size: 22px;
    padding: 10px 25px;
    transform: scale(1);
}

/* 🔵 زر 2 */
#btn2 {
    top: 72%;
    left: 20%;
    font-size: 22px;
    padding: 10px 25px;
    transform: scale(1);
}
</style>
</head>

<body>

<img src="1.png" width="100%" height="100%" style="position:absolute;z-index:-1;">

<form action="page2.html">
<button id="btn1" class="btn">Page 2</button>
</form>

<form action="page3.html">
<button id="btn2" class="btn">Page 3</button>
</form>

</body>
</html>
