<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<meta charset="utf-8">
<title>PS3LB</title>

<!-- 🚀 Preload الصور -->
<link rel="preload" as="image" href="2.png">
<link rel="preload" as="image" href="3.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* الصفحات */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
}

#home {
    display: block;
}

/* الخلفيات */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* الأزرار */
.btn {
    position: absolute;
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
}

/* ===== الصفحة الرئيسية ===== */
#btn1 { top: 63%; left: 30%; font-size: 22px; padding: 10px 40px; }
#btn2 { top: 73%; left: 30%; font-size: 22px; padding: 10px 40px; }

/* ===== الصفحة 2 ===== */
#p2_b1 { top: 47%; left: 34%; font-size: 20px; padding: 10px 50px; }
#p2_b2 { top: 61%; left: 34%; font-size: 20px; padding: 10px 50px; }
#p2_b3 { top: 74%; left: 34%; font-size: 20px; padding: 10px 50px; }

#p2_b4 { top: 47%; left: 80%; font-size: 20px; padding: 10px 40px; }
#p2_b5 { top: 61%; left: 69%; font-size: 20px; padding: 10px 30px; }
#p2_b6 { top: 61%; left: 80%; font-size: 20px; padding: 10px 30px; }
#p2_b7 { top: 84%; left: 76%; font-size: 20px; padding: 10px 50px; }

#p2_back { top: 85%; left: 45%; font-size: 24px; padding: 10px 30px; }

/* ===== الصفحة 3 ===== */
#p3_b1 { top: 25%; left: 15%; font-size: 20px; padding: 8px 18px; }
#p3_b2 { top: 25%; left: 40%; font-size: 18px; padding: 6px 16px; }
#p3_b3 { top: 25%; left: 65%; font-size: 22px; padding: 10px 20px; }

#p3_b4 { top: 55%; left: 15%; font-size: 20px; padding: 8px 18px; }
#p3_b5 { top: 55%; left: 40%; font-size: 18px; padding: 6px 16px; }
#p3_b6 { top: 55%; left: 65%; font-size: 22px; padding: 10px 20px; }
#p3_b7 { top: 74%; left: 76%; font-size: 20px; padding: 10px 50px; }

#p3_back { top: 85%; left: 45%; font-size: 24px; padding: 10px 30px; }
</style>

<script>
// 🚀 تحميل الصور مسبقًا (مهم جدًا للـ PS3)
function preloadImages() {
    var img1 = new Image();
    var img2 = new Image();

    img1.src = "2.png";
    img2.src = "3.png";
}

// 🎮 التنقل السريع
function showPage(page) {
    document.getElementById("home").style.display = "none";
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "none";

    document.getElementById(page).style.display = "block";
}

window.onload = preloadImages;
</script>

</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home" class="page">
    <img src="1.png" class="bg">

    <button id="btn1" class="btn" onclick="showPage('page2')">Click Here</button>
    <button id="btn2" class="btn" onclick="showPage('page3')">Click Here</button>
</div>

<!-- الصفحة 2 -->
<div id="page2" class="page">
    <img src="2.png" class="bg">

    <button id="p2_b1" class="btn" onclick="window.location='LINK1'">DOWNLOAD</button>
    <button id="p2_b2" class="btn" onclick="window.location='LINK2'">DOWNLOAD</button>
    <button id="p2_b3" class="btn" onclick="window.location='LINK3'">DOWNLOAD</button>

    <button id="p2_b4" class="btn" onclick="window.location='LINK4'">DOWNLOAD</button>
    <button id="p2_b5" class="btn" onclick="window.location='LINK5'">DOWNLOAD</button>
    <button id="p2_b6" class="btn" onclick="window.location='LINK6'">DOWNLOAD</button>
    <button id="p2_b7" class="btn" onclick="window.location='LINK6'">DOWNLOAD</button>

    <button id="p2_back" class="btn" onclick="showPage('home')">Back</button>
</div>

<!-- الصفحة 3 -->
<div id="page3" class="page">
    <img src="3.png" class="bg">

    <button id="p3_b1" class="btn" onclick="window.location='LINK1'">Btn1</button>
    <button id="p3_b2" class="btn" onclick="window.location='LINK2'">Btn2</button>
    <button id="p3_b3" class="btn" onclick="window.location='LINK3'">Btn3</button>

    <button id="p3_b4" class="btn" onclick="window.location='LINK4'">Btn4</button>
    <button id="p3_b5" class="btn" onclick="window.location='LINK5'">Btn5</button>
    <button id="p3_b6" class="btn" onclick="window.location='LINK6'">Btn6</button>
    <button id="p3_b7" class="btn" onclick="window.location='LINK6'">DOWNLOAD</button>

    <button id="p3_back" class="btn" onclick="showPage('home')">Back</button>
</div>

</body>
</html>
